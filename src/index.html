<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extended Mania Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #1a1a1a;
      color: #fff;
      overflow: hidden;
    }

    .toolbar {
      height: 50px;
      background: #2d2d2d;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 15px;
      border-bottom: 1px solid #444;
      position: relative;
      z-index: 100;
      flex-shrink: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
      z-index: 1;
      min-height: 0;
    }

    #openFolderBtn {
      padding: 8px 16px;
      background: #ff66aa;
      border: none;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    .toolbar {
      z-index: 10000;
      position: relative;
    }

    .toolbar button:hover {
      background: #ff4d94;
    }

    .bpm-display {
      font-size: 14px;
      color: #ccc;
    }

    .bpm-value {
      color: #ff66aa;
      font-weight: bold;
    }

    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      margin-top: 50px;
      position: relative;
      z-index: 1;
    }

    .diff-list {
      width: 280px;
      background: #8B0000;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .diff-list::-webkit-scrollbar {
      width: 8px;
    }

    .diff-list::-webkit-scrollbar-track {
      background: #660000;
    }

    .diff-list::-webkit-scrollbar-thumb {
      background: #cc0000;
    }

    .diff-item {
      padding: 10px 15px;
      border-bottom: 1px solid #aa0000;
      cursor: grab;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .diff-item:hover {
      background: #aa0000;
    }

    .diff-item.active {
      background: #ff66aa;
    }

    .diff-item.dragging {
      opacity: 0.5;
      background: #cc0000;
    }

    .diff-item.drag-over {
      border-top: 2px solid #ff66aa;
    }

    .diff-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #ff66aa;
    }

    .diff-info-container {
      flex: 1;
    }

    .diff-item .diff-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .diff-item .diff-info {
      font-size: 11px;
      color: #ffcccc;
    }

    .diff-item.disabled {
      opacity: 0.5;
    }

    .diff-item.disabled .diff-name,
    .diff-item.disabled .diff-info {
      text-decoration: line-through;
    }

    .preview-area {
      flex: 1;
      background: #fff;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      padding: 10px 15px;
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-title {
      color: #333;
      font-weight: 600;
    }

    .preview-details {
      font-size: 12px;
      color: #666;
    }

    .preview-canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .preview-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
    }

    .timeline-panel {
      height: 30px;
      background: #0000FF;
      display: flex;
      align-items: center;
      padding: 0 15px;
    }

    .timeline-time {
      font-family: monospace;
      font-size: 13px;
      color: #fff;
    }

    .timeline-progress-container {
      flex: 1;
      height: 100%;
      position: relative;
      margin-left: 20px;
    }

    .timeline-progress-bar {
      height: 100%;
      background: #808080;
      position: relative;
    }

    .timeline-progress-fill {
      height: 100%;
      background: #ff66aa;
      width: 0%;
      transition: width 0.1s;
    }

    .snap-bar-container {
      height: 40px;
      background: #228B22;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 10px;
    }

    .snap-bar-label {
      font-size: 12px;
      color: #fff;
    }

    .snap-bar {
      flex: 1;
      height: 20px;
      background: #1a1a1a;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
    }

    .snap-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff66aa, #ff99cc);
      width: 0%;
      transition: width 0.1s;
    }

    .snap-options-container {
      height: 50px;
      background: #FFA500;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 5px;
      overflow-x: auto;
    }

    .snap-option {
      padding: 6px 12px;
      background: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .snap-option:hover {
      background: #eee;
    }

    .snap-option.active {
      background: #ff66aa;
      color: #fff;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .empty-state p {
      margin-top: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="openFolderBtn">Open Folder</button>
    <span class="bpm-display">BPM: <span class="bpm-value" id="bpmValue">--</span></span>
  </div>

  <div class="main-container">
    <div class="diff-list" id="diffList">
      <div class="empty-state">
        <p>Open a Songs folder to begin</p>
      </div>
    </div>

    <div class="preview-area">
      <div class="preview-header">
        <span class="preview-title" id="previewTitle">No beatmap selected</span>
      </div>
      <div class="preview-canvas-container">
        <canvas class="preview-canvas" id="previewCanvas"></canvas>
        <div class="empty-state" id="noPreview">
          <p>Select a difficulty to preview</p>
        </div>
      </div>
    </div>
  </div>

  <div class="timeline-panel">
    <span class="timeline-time" id="timelineTime">00:00:000</span>
    <div class="timeline-progress-container">
      <div class="timeline-progress-bar" id="timelineProgressBar">
        <div class="timeline-progress-fill" id="timelineProgressFill"></div>
      </div>
    </div>
  </div>

  <div class="snap-options-container" id="snapOptions">
    <button class="snap-option" data-snap="1">1/1</button>
    <button class="snap-option" data-snap="2">1/2</button>
    <button class="snap-option" data-snap="3">1/3</button>
    <button class="snap-option active" data-snap="4">1/4</button>
    <button class="snap-option" data-snap="5">1/5</button>
    <button class="snap-option" data-snap="6">1/6</button>
    <button class="snap-option" data-snap="7">1/7</button>
    <button class="snap-option" data-snap="8">1/8</button>
    <button class="snap-option" data-snap="9">1/9</button>
    <button class="snap-option" data-snap="12">1/12</button>
    <button class="snap-option" data-snap="16">1/16</button>
  </div>

  <script>
    window.openFolder = async function() {
      const folderPath = await window.electronAPI.openFolder();
      if (!folderPath) return;
      
      const beatmapSet = await window.electronAPI.readBeatmaps(folderPath);
      
      if (!beatmapSet || beatmapSet.difficulties.length === 0) {
        alert('No osu!mania beatmaps found in this folder');
        return;
      }
      
      beatmaps = beatmapSet.difficulties;
      scrollPosition = 0;
      zoom = 1;
      
      document.getElementById('bpmValue').textContent = beatmapSet.bpm ? beatmapSet.bpm.toFixed(1) : '--';
      
      renderDiffList();
      updateTimeline();
    };

    const SNAP_DIVISORS = [1, 2, 3, 4, 5, 6, 7, 8, 9, 12, 16];
    
    let beatmaps = [];
    let currentBeatmap = null;
    let currentSnapDivisor = 4;
    let scrollPosition = 0;
    let maxScrollTime = 0;
    let canvas, ctx;
    let zoom = 1;
    let pixelsPerMs = 2;
    const MIN_ZOOM = 0.1;
    const MAX_ZOOM = 10;

    const COLORS = {
      circleStart: '#ff66aa',
      circleNormal: '#ff99cc',
      slider: '#66aaff',
      spinner: '#ffcc66',
      snapLine: '#e0e0e0',
      playField: '#f5f5f5'
    };

    document.addEventListener('DOMContentLoaded', () => {
      canvas = document.getElementById('previewCanvas');
      ctx = canvas.getContext('2d');
      
      setupCanvas();
      setupEventListeners();
      
      window.addEventListener('resize', () => {
        setupCanvas();
        if (beatmaps.length > 0) drawPreview();
      });
    });

    function setupCanvas() {
      const container = canvas.parentElement;
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
    }

    function setupEventListeners() {
      console.log('Setting up event listeners');
      var btn = document.getElementById('openFolderBtn');
      console.log('Button element:', btn);
      if (btn) {
        btn.addEventListener('click', function() {
          console.log('Button clicked, calling openFolder');
          window.openFolder();
        });
      }
      
      document.querySelectorAll('.snap-option').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.snap-option').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentSnapDivisor = parseInt(btn.dataset.snap);
          if (beatmaps.length > 0) drawPreview();
        });
      });

      const progressBar = document.getElementById('timelineProgressBar');
      let isDragging = false;
      
      progressBar.addEventListener('mousedown', (e) => {
        isDragging = true;
        updateProgressFromMouse(e);
      });
      
      document.addEventListener('mousemove', (e) => {
        if (isDragging) updateProgressFromMouse(e);
      });
      
      document.addEventListener('mouseup', () => {
        isDragging = false;
      });

      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        
        if (e.ctrlKey) {
          const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
          zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom * zoomFactor));
          drawPreview();
        } else {
          const scrollAmount = e.shiftKey ? e.deltaY * 10 : e.deltaY;
          const maxScroll = getTotalDuration();
          maxScrollTime = maxScroll;
          
          scrollPosition += scrollAmount * zoom;
          scrollPosition = Math.max(0, Math.min(maxScroll, scrollPosition));
      console.log('scrollPosition after clamp:', scrollPosition);
          
          updateTimeline();
          drawPreview();
        }
      }, { passive: false });

      const diffList = document.getElementById('diffList');
      diffList.addEventListener('scroll', () => {
        if (beatmaps.length > 0 && maxScrollTime > 0) {
          scrollPosition = diffList.scrollTop / (diffList.scrollHeight - diffList.clientHeight) * maxScrollTime;
          updateTimeline();
          drawPreview();
        }
      });
    }

    function getTotalDuration() {
      let maxTime = 0;
      beatmaps.forEach(bm => {
        if (bm.enabled !== false) {
          const lastCircle = bm.circles.length > 0 ? Math.max(...bm.circles.map(c => c.time)) : 0;
          const lastSlider = bm.sliders.length > 0 ? Math.max(...bm.sliders.map(s => s.time)) : 0;
          maxTime = Math.max(maxTime, lastCircle, lastSlider);
        }
      });
      return maxTime > 0 ? maxTime + 5000 : 60000;
    }

    function updateProgressFromMouse(e) {
      const bar = document.getElementById('timelineProgressBar');
      const rect = bar.getBoundingClientRect();
      const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      
      scrollPosition = percent * maxScrollTime;
      updateTimeline();
      
      const diffList = document.getElementById('diffList');
      diffList.scrollTop = percent * (diffList.scrollHeight - diffList.clientHeight);
      
      if (currentBeatmap) drawPreview();
    }

    function updateTimeline() {
      const ms = Math.round(scrollPosition);
      const minutes = Math.floor(ms / 60000);
      const seconds = Math.floor((ms % 60000) / 1000);
      const millis = ms % 1000;
      
      document.getElementById('timelineTime').textContent = 
        `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(millis).padStart(3, '0')}`;
      
      if (maxScrollTime > 0) {
        const percent = (scrollPosition / maxScrollTime) * 100;
        document.getElementById('timelineProgressFill').style.width = percent + '%';
      }
    }

    function renderDiffList() {
      const container = document.getElementById('diffList');
      container.innerHTML = '';
      
      beatmaps.forEach((bm, index) => {
        const item = document.createElement('div');
        item.className = 'diff-item' + (bm.enabled === false ? ' disabled' : '');
        item.draggable = true;
        item.dataset.index = index;
        
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'diff-checkbox';
        checkbox.checked = bm.enabled !== false;
        checkbox.addEventListener('change', (e) => {
          e.stopPropagation();
          bm.enabled = checkbox.checked;
          item.classList.toggle('disabled', !checkbox.checked);
          drawPreview();
        });
        
        const infoContainer = document.createElement('div');
        infoContainer.className = 'diff-info-container';
        infoContainer.innerHTML = `
          <div class="diff-name">${bm.version || bm.fileName || 'Unknown'}</div>
          <div class="diff-info">${bm.circles.length + bm.sliders.length} notes | CS: ${bm.cs} | OD: ${bm.od}</div>
        `;
        infoContainer.addEventListener('click', () => selectBeatmap(index));
        
        item.appendChild(checkbox);
        item.appendChild(infoContainer);
        
        item.addEventListener('dragstart', handleDragStart);
        item.addEventListener('dragend', handleDragEnd);
        item.addEventListener('dragover', handleDragOver);
        item.addEventListener('drop', handleDrop);
        
        container.appendChild(item);
      });
      
      selectBeatmap(0);
      drawPreview();
    }

    let draggedIndex = null;

    function handleDragStart(e) {
      draggedIndex = parseInt(e.target.dataset.index);
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.diff-item').forEach(item => {
        item.classList.remove('drag-over');
      });
      draggedIndex = null;
      drawPreview();
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const item = e.target.closest('.diff-item');
      if (item && parseInt(item.dataset.index) !== draggedIndex) {
        item.classList.add('drag-over');
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      const dropTarget = e.target.closest('.diff-item');
      if (!dropTarget || draggedIndex === null) return;
      
      const dropIndex = parseInt(dropTarget.dataset.index);
      if (draggedIndex === dropIndex) return;
      
      const [moved] = beatmaps.splice(draggedIndex, 1);
      beatmaps.splice(dropIndex, 0, moved);
      
      renderDiffList();
    }

    function selectBeatmap(index) {
      document.querySelectorAll('.diff-item').forEach((item, i) => {
        item.classList.toggle('active', i === index);
      });
      
      currentBeatmap = beatmaps[index];
      
      const titleEl = document.getElementById('previewTitle');
      if (titleEl) {
        titleEl.textContent = currentBeatmap.fileName || 'Selected';
      }
      
      const bpmEl = document.getElementById('bpmValue');
      if (bpmEl && currentBeatmap.bpm) {
        bpmEl.textContent = currentBeatmap.bpm.toFixed(1);
      }
      
      document.getElementById('noPreview').style.display = 'none';
      
      maxScrollTime = getTotalDuration();
      
      scrollPosition = 0;
      zoom = 1;
      updateTimeline();
      drawPreview();
    }

    function drawPreview() {
      if (!beatmaps || beatmaps.length === 0) {
        return;
      }
      
      canvas = document.getElementById('previewCanvas');
      ctx = canvas ? canvas.getContext('2d') : null;
      if (!canvas || !ctx) {
        return;
      }
      
      const enabledDiffs = beatmaps.filter(b => b.enabled !== false);
      
      console.log('enabledDiffs:', enabledDiffs.length);
      
      if (enabledDiffs.length === 0 || !ctx) {
        console.log('No enabled diffs or no ctx');
        return;
      }
      
      if (!canvas) {
        canvas = document.getElementById('previewCanvas');
        ctx = canvas.getContext('2d');
      }
      
      if (!canvas || !ctx) {
        console.log('Canvas not ready');
        return;
      }
      
      if (enabledDiffs.length === 0) {
        ctx.fillStyle = '#1a1a24';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#666';
        ctx.font = '16px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('No difficulties enabled', canvas.width / 2, canvas.height / 2);
        return;
      }
      
      const diffCount = enabledDiffs.length;
      const panelWidth = canvas.width / diffCount;
      const padding = 10;
      
      let startTime = scrollPosition;
      if (startTime === 0) {
        let minNoteTime = null;
        enabledDiffs.forEach(d => {
          if (d.circles.length > 0 && (minNoteTime === null || d.circles[0].time < minNoteTime)) {
            minNoteTime = d.circles[0].time;
          }
          if (d.sliders.length > 0 && (minNoteTime === null || d.sliders[0].time < minNoteTime)) {
            minNoteTime = d.sliders[0].time;
          }
        });
        if (minNoteTime !== null && minNoteTime > 500) {
          startTime = minNoteTime - 1000;
          scrollPosition = startTime;
        } else {
          startTime = 0;
          scrollPosition = 0;
        }
      }
      
      const visibleTime = canvas.height / zoom;
      
      let cs = 4;
      try {
        cs = enabledDiffs[0] ? (enabledDiffs[0].cs || 4) : 4;
      } catch(e) {
        cs = 4;
      }
      let laneColors = ['#ffffff', '#87ceeb', '#87ceeb', '#ffffff'];
      try {
        laneColors = getLaneColors(cs);
      } catch(e) {
        console.log('getLaneColors error:', e);
      }
      
      enabledDiffs.forEach((diff, diffIndex) => {
        const xOffset = diffIndex * panelWidth;
        const playableWidth = panelWidth - padding * 2;
        const laneCount = diff.cs || 4;
        const laneWidth = playableWidth / laneCount;
        
        ctx.fillStyle = '#1a1a24';
        ctx.fillRect(xOffset, 0, panelWidth, canvas.height);
        
        for (let i = 0; i < laneCount; i++) {
          const x = xOffset + padding + i * laneWidth;
          ctx.fillStyle = '#252533';
          ctx.fillRect(x + 2, 0, laneWidth - 4, canvas.height);
          ctx.strokeStyle = '#353548';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x + 2, 0);
          ctx.lineTo(x + 2, canvas.height);
          ctx.stroke();
        }
        
        ctx.strokeStyle = '#4a4a65';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(xOffset, 0);
        ctx.lineTo(xOffset, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(xOffset + panelWidth, 0);
        ctx.lineTo(xOffset + panelWidth, canvas.height);
        ctx.stroke();
        
        drawSnapLines(diff, xOffset, padding, laneWidth, laneCount, startTime, visibleTime);
        drawNotes(diff, xOffset, padding, laneWidth, laneCount, laneColors, startTime, visibleTime);
      });
    }

    function getLaneColors(numKeys) {
      const colors = [];
      if (numKeys === 4) {
        return ['#ffffff', '#87ceeb', '#87ceeb', '#ffffff'];
      } else if (numKeys === 5) {
        return ['#ffffff', '#87ceeb', '#ffd700', '#87ceeb', '#ffffff'];
      } else if (numKeys === 6) {
        return ['#ffffff', '#87ceeb', '#87ceeb', '#ffffff', '#87ceeb', '#ffffff'];
      } else if (numKeys === 7) {
        return ['#ffffff', '#87ceeb', '#87ceeb', '#ffd700', '#ffffff', '#87ceeb', '#ffffff'];
      } else if (numKeys === 8) {
        return ['#ffffff', '#87ceeb', '#87ceeb', '#ffb6c1', '#ffb6c1', '#87ceeb', '#87ceeb', '#ffffff'];
      } else if (numKeys === 9) {
        return ['#ffffff', '#87ceeb', '#87ceeb', '#ffb6c1', '#ffd700', '#ffb6c1', '#87ceeb', '#87ceeb', '#ffffff'];
      } else if (numKeys === 10) {
        return ['#ffffff', '#87ceeb', '#87ceeb', '#ffb6c1', '#ffd700', '#ffd700', '#ffb6c1', '#87ceeb', '#87ceeb', '#ffffff'];
      }
      for (let i = 0; i < numKeys; i++) {
        colors.push(i % 2 === 0 ? '#ffffff' : '#87ceeb');
      }
      return colors;
    }

    function timeToY(time, startTime, visibleTime) {
      return canvas.height - 80 - ((time - startTime) / visibleTime) * (canvas.height - 100);
    }

    function drawSnapLines(diff, xOffset, padding, laneWidth, laneCount, startTime, visibleTime) {
      if (!diff.timingPoints || diff.timingPoints.length === 0) return;
      
      const SNAP_COLORS = {
        1: '#ff4444',
        2: '#ff8844',
        3: '#ffcc44',
        4: '#44ff44',
        5: '#44ffff',
        6: '#4488ff',
        7: '#8844ff',
        8: '#ff44ff',
        9: '#ffffff',
        12: '#aaaaaa',
        16: '#666666'
      };
      
      const snapDivisor = currentSnapDivisor;
      const lineColor = SNAP_COLORS[snapDivisor] || '#ffffff';
      
      const endTime = startTime + visibleTime;
      
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.5;
      
      let currentMsPerBeat = diff.timingPoints[0]?.msPerBeat || 500;
      
      for (let i = 0; i < diff.timingPoints.length; i++) {
        const tp = diff.timingPoints[i];
        const nextTp = diff.timingPoints[i + 1];
        
        if (tp.time > endTime) break;
        
        currentMsPerBeat = tp.msPerBeat;
        const tpEndTime = nextTp ? nextTp.time : endTime + 10000;
        
        const snapDuration = currentMsPerBeat / snapDivisor;
        
        let time = Math.max(tp.time, startTime);
        time = Math.ceil((time - tp.time) / snapDuration) * snapDuration + tp.time;
        
        while (time <= Math.min(tpEndTime, endTime)) {
          const y = timeToY(time, startTime, visibleTime);
          
          if (y < canvas.height && y > 0) {
            ctx.beginPath();
            ctx.moveTo(xOffset + padding, y);
            ctx.lineTo(xOffset + padding + laneWidth * laneCount, y);
            ctx.stroke();
          }
          
          time += snapDuration;
        }
      }
      
      ctx.globalAlpha = 1;
    }

    function drawNotes(diff, xOffset, padding, laneWidth, laneCount, laneColors, startTime, visibleTime) {
      const endTime = startTime + visibleTime;
      
      const cs = diff.cs || 4;
      const laneSize = 512 / cs;
      
      const allNotes = [];
      
      diff.sliders.forEach(slider => {
        const noteEndTime = slider.endTime || slider.time + 100;
        if (noteEndTime >= startTime - 100 && slider.time <= endTime + 100) {
          allNotes.push({
            time: slider.time,
            endTime: noteEndTime,
            x: slider.x,
            type: 'hold',
            sortKey: slider.time * 1000 + slider.x
          });
        }
      });
      
      diff.circles.forEach(circle => {
        if (circle.time >= startTime - 100 && circle.time <= endTime + 100) {
          allNotes.push({
            time: circle.time,
            x: circle.x,
            type: 'circle',
            sortKey: circle.time * 1000 + circle.x
          });
        }
      });
      
      allNotes.sort((a, b) => a.sortKey - b.sortKey);
      
      const noteHeight = 16;
      const noteWidth = laneWidth - 4;
      
      allNotes.forEach(note => {
        const lane = Math.floor(note.x / laneSize);
        if (lane >= laneCount) return;
        
        const x = xOffset + padding + lane * laneWidth + 2;
        const fillColor = laneColors[lane] || '#ffffff';
        
        if (note.type === 'hold') {
          const yStart = timeToY(note.time, startTime, visibleTime);
          const yEnd = timeToY(note.endTime, startTime, visibleTime);
          
          const bodyTop = yEnd - noteHeight;
          const bodyHeight = yStart - yEnd + noteHeight;
          
          ctx.fillStyle = fillColor;
          ctx.fillRect(x + 4, bodyTop, noteWidth - 8, bodyHeight);
          ctx.strokeStyle = fillColor;
          ctx.lineWidth = 2;
          ctx.strokeRect(x + 4, bodyTop, noteWidth - 8, bodyHeight);
          
          const endColor = laneColors[lane];
          ctx.fillStyle = endColor;
          ctx.fillRect(x + 4, bodyTop, noteWidth - 8, noteHeight - 4);
        } else {
          const y = timeToY(note.time, startTime, visibleTime);
          
          ctx.fillStyle = fillColor;
          ctx.fillRect(x, y - noteHeight, noteWidth, noteHeight);
          ctx.strokeStyle = fillColor;
          ctx.lineWidth = 1;
          ctx.strokeRect(x, y - noteHeight, noteWidth, noteHeight);
          
          const innerColor = fillColor === '#ffd700' ? '#ffd700' : (fillColor === '#87ceeb' ? '#87ceeb' : '#ffffff');
          ctx.fillStyle = innerColor;
          ctx.fillRect(x + 2, y - noteHeight + 2, noteWidth - 4, noteHeight - 4);
        }
      });
    }
  </script>
